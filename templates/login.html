<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - Relay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=6">
    <script>
        (function() {
            var t = localStorage.getItem("relay-theme") || "dark";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
</head>
{% from "_form_helpers.html" import password_input %}
<body class="login-body">
    <div class="login-card">
        <div class="login-brand">
            <div class="brand-mark">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 12C4 7.58172 7.58172 4 12 4C15.3923 4 18.2932 6.11723 19.4444 9.09883" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M20 4V9H15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20 12C20 16.4183 16.4183 20 12 20C8.60771 20 5.70684 17.8828 4.55557 14.9012" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M4 20V15H9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
        <h1>Sign in to Relay</h1>
        <p class="login-sub">Content automation admin</p>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if message %}
        <div class="alert alert-success">{{ message }}</div>
        {% endif %}
        <form method="post" action="/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">Password</label>
            {{ password_input("password", "password", autocomplete="current-password") }}

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <span class="btn-text-default">Log in</span>
                <span class="spinner"></span>
            </button>
        </form>
    </div>
    <script src="/static/js/app.js?v=6"></script>
</body>
</html>
